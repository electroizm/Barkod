<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sevk Fişi - Güneşler Elektronik</title>
    <link rel="stylesheet" href="/css/stil.css">
</head>
<body>
    <div class="kapsayici">
        <a href="/anasayfa.html" class="geri-buton">Geri</a>

        <h1 class="baslik">Sevk Fişi</h1>
        <span id="kullaniciBilgi" style="display:none;"></span>

        <!-- DURUM 1: Fiş Seçim Alanı -->
        <div id="fisSecimAlani" class="fis-secim" style="display: none;">
            <label for="fisNoInput">Fiş No</label>
            <input type="text" id="fisNoInput" placeholder="Örn: 185">
            <button type="button" class="ara-btn" id="fisAraBtn">Sevk Fişi Ara</button>
            <button type="button" class="acik-fis-btn" id="acikFislerBtn">Açık Sevk Fişleri</button>
            <button type="button" class="kapatilan-fis-btn" id="kapatilanFislerBtn">Kapatılan Sevk Fişleri</button>
        </div>

        <!-- Açık Sevk Fişleri Modal -->
        <div id="acikFisOverlay" class="fis-overlay">
            <div class="fis-modal">
                <div class="modal-baslik">
                    <h3>Açık Sevk Fişleri</h3>
                    <button type="button" class="modal-kapat" id="acikModalKapat">&times;</button>
                </div>
                <div id="acikFisListesi" class="fis-liste"></div>
            </div>
        </div>

        <!-- Kapatılan Sevk Fişleri Modal -->
        <div id="kapatilanFisOverlay" class="fis-overlay">
            <div class="fis-modal">
                <div class="modal-baslik">
                    <h3>Kapatılan Sevk Fişleri</h3>
                    <button type="button" class="modal-kapat" id="kapatilanModalKapat">&times;</button>
                </div>
                <div id="kapatilanFisListesi" class="fis-liste"></div>
            </div>
        </div>

        <!-- DURUM 2: Okutma Alanı -->
        <div id="okutmaAlani" style="display: none;">
            <!-- Fiş Özet -->
            <div class="fis-ozet" id="fisOzet">Fiş: -</div>

            <!-- İlerleme -->
            <div class="progress-container gizle" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    <span class="progress-text" id="progressText">0%</span>
                </div>
                <div class="progress-stats">
                    <span id="kalanPaketGoster" style="color: #ef4444;">0</span>
                    <span class="stat-separator">/</span>
                    <span id="okunanPaketGoster" style="color: #22c55e;">0</span>
                    <span class="stat-separator">/</span>
                    <span id="toplamPaketGoster" style="color: #3b82f6;">0</span>
                </div>
            </div>

            <!-- Son Mesaj -->
            <div class="son-mesaj gizle" id="sonMesaj"></div>

            <!-- QR Okuma Alanı -->
            <div class="okuma-alani" id="okumaAlani">
                <div id="barkodOkuyucuAlani"></div>
            </div>

            <!-- Tamamlandı Kutusu -->
            <div class="tamamlandi-kutu gizle" id="tamamlandiKutu">
                <h2>Tamamlandı!</h2>
                <p>Tüm paketler başarıyla okundu.</p>
                <button type="button" class="yeni-fis-btn" onclick="fisDegistir()">Yeni Fiş Seç</button>
            </div>

            <!-- Son Okumalar -->
            <div class="son-okumalar" id="sonOkumalarAlani">
                <h3>Son Okumalar</h3>
                <div class="okuma-listesi" id="okumaListesi"></div>
            </div>

            <!-- Malzeme Listesi -->
            <div class="malzeme-listesi" id="malzemeListesiAlani">
                <div class="malzeme-baslik-satir">
                    <h3>Malzeme Durumu</h3>
                    <div class="malzeme-butonlar">
                        <button type="button" onclick="tumunuDaralt()" class="btn-daralt">Daralt</button>
                        <button type="button" onclick="tumunuGenislet()" class="btn-genislet">Genişlet</button>
                    </div>
                </div>
                <div id="malzemeListesi"></div>
            </div>
        </div>

        <!-- Hata mesajı -->
        <div id="hataKutusu" class="hata-kutu" style="display: none;"></div>
    </div>

    <div id="yukleniyor" class="yukleniyor-overlay gizle">
        <div class="spinner"></div>
    </div>

    <script src="/js/ortak.js"></script>
    <script src="/js/barkod-okuyucu.js"></script>
    <script>
        // ==========================================
        // ELEMENTLER
        // ==========================================
        const fisSecimAlani = document.getElementById('fisSecimAlani');
        const okutmaAlani = document.getElementById('okutmaAlani');
        const fisNoInput = document.getElementById('fisNoInput');
        const fisAraBtn = document.getElementById('fisAraBtn');
        const fisOzet = document.getElementById('fisOzet');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const okunanPaketGoster = document.getElementById('okunanPaketGoster');
        const kalanPaketGoster = document.getElementById('kalanPaketGoster');
        const toplamPaketGoster = document.getElementById('toplamPaketGoster');
        const okumaAlaniEl = document.getElementById('okumaAlani');
        const sonMesaj = document.getElementById('sonMesaj');
        const tamamlandiKutu = document.getElementById('tamamlandiKutu');
        const okumaListesi = document.getElementById('okumaListesi');
        const malzemeListesiEl = document.getElementById('malzemeListesi');
        const hataKutusu = document.getElementById('hataKutusu');
        const yukleniyorOverlay = document.getElementById('yukleniyor');

        const acikFislerBtn = document.getElementById('acikFislerBtn');
        const acikFisOverlay = document.getElementById('acikFisOverlay');
        const acikFisListesi = document.getElementById('acikFisListesi');
        const acikModalKapat = document.getElementById('acikModalKapat');

        const kapatilanFislerBtn = document.getElementById('kapatilanFislerBtn');
        const kapatilanFisOverlay = document.getElementById('kapatilanFisOverlay');
        const kapatilanFisListesi = document.getElementById('kapatilanFisListesi');
        const kapatilanModalKapat = document.getElementById('kapatilanModalKapat');

        let mevcutFis = null;
        let fisNo = null;
        let okumalar = [];
        let barkodOkuyucu = null;

        // ==========================================
        // FRONTEND CACHE SİSTEMİ
        // ==========================================
        const CACHE_KEY_PREFIX = 'sevk_fis_cache_';

        function getCacheKey() { return CACHE_KEY_PREFIX + fisNo; }

        function frontendCacheYukle() {
            try {
                const data = localStorage.getItem(getCacheKey());
                return data ? new Set(JSON.parse(data)) : new Set();
            } catch (e) { return new Set(); }
        }

        function frontendCacheKaydet(okunanSet) {
            try { localStorage.setItem(getCacheKey(), JSON.stringify([...okunanSet])); }
            catch (e) { console.warn('Cache kaydetme hatası:', e); }
        }

        function frontendCacheyeEkle(qrKod) {
            const cache = frontendCacheYukle();
            cache.add(qrKod);
            frontendCacheKaydet(cache);
        }

        function frontendCachedeVarMi(qrKod) {
            return frontendCacheYukle().has(qrKod);
        }

        async function frontendCacheSenkronize() {
            try {
                const response = await fetch(`/api/sevk/okunan-qrler/${encodeURIComponent(fisNo)}`);
                const data = await response.json();
                if (data.success && data.okunan_qrler) {
                    const cache = new Set(data.okunan_qrler);
                    frontendCacheKaydet(cache);
                    console.log(`Cache senkronize edildi: ${cache.size} QR kod`);
                    return cache.size;
                }
                return 0;
            } catch (e) {
                console.warn('Cache senkronizasyon hatası:', e);
                return 0;
            }
        }

        // ==========================================
        // SAYFA BAŞLANGIÇ
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const fisParam = urlParams.get('fis');

        if (fisParam) {
            fisYukle(fisParam);
        } else {
            fisSecimAlani.style.display = 'block';
        }

        // ==========================================
        // FİŞ SEÇİM
        // ==========================================

        // Otomatik arama (3 haneli sayı girilince)
        fisNoInput.addEventListener('input', function(e) {
            const deger = e.target.value.trim();
            if (/^\d{3,5}$/.test(deger)) {
                fisYukle(deger);
            }
        });

        fisAraBtn.addEventListener('click', function() {
            const no = fisNoInput.value.trim();
            if (no) { fisYukle(no); }
            else { hataGoster('Lütfen fiş numarası girin'); }
        });

        fisNoInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') fisAraBtn.click();
        });

        function fisDegistir() {
            okutmaAlani.style.display = 'none';
            fisSecimAlani.style.display = 'block';
            hataGizle();
            mevcutFis = null;
            fisNo = null;
            okumalar = [];
            tamamlandiKutu.classList.add('gizle');
            okumaAlaniEl.style.display = '';
            sonMesaj.classList.add('gizle');
            okumaListesi.innerHTML = '';
            malzemeListesiEl.innerHTML = '';
            history.replaceState(null, '', '/sevk.html');
            fisNoInput.value = '';
            fisNoInput.focus();
        }

        // ==========================================
        // AÇIK FİŞLER MODAL
        // ==========================================
        acikFislerBtn.addEventListener('click', async function() {
            acikFisListesi.innerHTML = '<div class="bos-liste">Yükleniyor...</div>';
            acikFisOverlay.classList.add('goster');

            try {
                const response = await fetch('/api/sevk/acik-fisler');
                const data = await response.json();

                if (data.success && data.fisler.length > 0) {
                    acikFisListesi.innerHTML = data.fisler.map(fis => {
                        const tarih = fis.tarih ? new Date(fis.tarih).toLocaleDateString('tr-TR') : '-';
                        return `
                            <div class="fis-item" data-fis="${fis.evrakno_sira}">
                                <div class="fis-item-baslik">${fis.evrak_adi || 'Sevk Fişi'} - ${fis.evrakno_sira}</div>
                                <div class="fis-item-detay">${tarih}</div>
                                <div class="fis-item-kalan">${fis.kalan_paket} paket kaldı (${fis.okunan_paket}/${fis.toplam_paket})</div>
                            </div>
                        `;
                    }).join('');

                    acikFisListesi.querySelectorAll('.fis-item').forEach(item => {
                        item.addEventListener('click', function() {
                            acikFisOverlay.classList.remove('goster');
                            fisYukle(this.dataset.fis);
                        });
                    });
                } else {
                    acikFisListesi.innerHTML = '<div class="bos-liste">Açık fiş bulunamadı</div>';
                }
            } catch (error) {
                acikFisListesi.innerHTML = '<div class="bos-liste">Hata: ' + error.message + '</div>';
            }
        });

        acikModalKapat.addEventListener('click', function() { acikFisOverlay.classList.remove('goster'); });
        acikFisOverlay.addEventListener('click', function(e) { if (e.target === acikFisOverlay) acikFisOverlay.classList.remove('goster'); });

        // ==========================================
        // KAPATILAN FİŞLER MODAL
        // ==========================================
        kapatilanFislerBtn.addEventListener('click', async function() {
            kapatilanFisListesi.innerHTML = '<div class="bos-liste">Yükleniyor...</div>';
            kapatilanFisOverlay.classList.add('goster');

            try {
                const response = await fetch('/api/sevk/kapatilan-fisler');
                const data = await response.json();

                if (data.success && data.fisler.length > 0) {
                    kapatilanFisListesi.innerHTML = data.fisler.map(fis => {
                        const tarih = fis.tarih ? new Date(fis.tarih).toLocaleDateString('tr-TR') : '-';
                        return `
                            <div class="fis-item" data-fis="${fis.evrakno_sira}">
                                <div class="fis-item-baslik">${fis.evrak_adi || 'Sevk Fişi'} - ${fis.evrakno_sira}</div>
                                <div class="fis-item-detay">${tarih}</div>
                                <div class="fis-item-kalan" style="color: #27ae60;">Tamamlandı (${fis.okunan_paket}/${fis.toplam_paket})</div>
                            </div>
                        `;
                    }).join('');

                    kapatilanFisListesi.querySelectorAll('.fis-item').forEach(item => {
                        item.addEventListener('click', function() {
                            kapatilanFisOverlay.classList.remove('goster');
                            fisYukle(this.dataset.fis);
                        });
                    });
                } else {
                    kapatilanFisListesi.innerHTML = '<div class="bos-liste">Kapatılan fiş bulunamadı</div>';
                }
            } catch (error) {
                kapatilanFisListesi.innerHTML = '<div class="bos-liste">Hata: ' + error.message + '</div>';
            }
        });

        kapatilanModalKapat.addEventListener('click', function() { kapatilanFisOverlay.classList.remove('goster'); });
        kapatilanFisOverlay.addEventListener('click', function(e) { if (e.target === kapatilanFisOverlay) kapatilanFisOverlay.classList.remove('goster'); });

        // ==========================================
        // FİŞ YÜKLE & OKUTMA BAŞLAT
        // ==========================================
        async function fisYukle(no) {
            yukleniyorGoster();
            hataGizle();

            try {
                const response = await fetch(`/api/sevk/fis/${encodeURIComponent(no)}`);
                const data = await response.json();

                if (data.success) {
                    mevcutFis = data.fis;
                    fisNo = no;

                    // Kompakt özet
                    fisOzet.textContent = `Fiş: ${mevcutFis.evrakno_sira} - ${mevcutFis.evrak_adi || '-'}`;

                    // Durum 2'ye geç
                    fisSecimAlani.style.display = 'none';
                    okutmaAlani.style.display = 'block';

                    // URL güncelle
                    history.replaceState(null, '', `?fis=${no}`);

                    // Cache senkronize et & okutma başlat
                    await frontendCacheSenkronize();
                    durumGuncelle();

                    // Barkod okuyucu başlat (zaten yoksa)
                    if (!barkodOkuyucu) {
                        barkodOkuyucu = new BarkodOkuyucu('#barkodOkuyucuAlani', {
                            gs1Dogrulama: true,
                            hataGosterici: (hata) => okumaHatali(hata, 'format'),
                            okumaSonrasi: qrOkut
                        });

                        // İlerleme çubuğunu barkod-alt-satir içine taşı
                        setTimeout(() => {
                            const barkodEtiket = document.querySelector('.barkod-etiket');
                            const progressContainer = document.getElementById('progressContainer');
                            if (barkodEtiket && progressContainer) {
                                barkodEtiket.parentNode.insertBefore(progressContainer, barkodEtiket);
                                barkodEtiket.remove();
                                progressContainer.classList.remove('gizle');
                                progressContainer.style.flex = '1';
                                progressContainer.style.margin = '0';
                            }
                        }, 100);
                    } else {
                        barkodOkuyucu.odaklan();
                    }

                } else {
                    hataGoster(data.message || 'Sevk fişi bulunamadı');
                    fisSecimAlani.style.display = 'block';
                    okutmaAlani.style.display = 'none';
                }
            } catch (error) {
                hataGoster('Bağlantı hatası: ' + error.message);
                fisSecimAlani.style.display = 'block';
                okutmaAlani.style.display = 'none';
            } finally {
                yukleniyorGizle();
            }
        }

        // ==========================================
        // QR OKUTMA
        // ==========================================
        async function qrOkut(qrKod) {
            if (!qrKod) return;
            qrKod = qrKod.replace(/[\x00-\x1F\x7F]/g, '').trim();
            if (!qrKod) return;

            // Frontend cache kontrolü
            if (frontendCachedeVarMi(qrKod)) {
                okumaHatali('Bu paket zaten okundu!', 'DUPLICATE_QR');
                sesliGeriBildirim('tekrar');
                return;
            }

            yukleniyorGoster();
            okumaAlaniTemizle();

            try {
                const kullanici = document.getElementById('kullaniciBilgi')?.textContent || 'bilinmiyor';

                const response = await fetch('/api/sevk/qr-okut', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fis_no: fisNo,
                        qr_kod: qrKod,
                        kullanici: kullanici
                    })
                });

                const data = await response.json();

                if (data.success) {
                    frontendCacheyeEkle(qrKod);
                    okumaBasarili(data);
                    sesliGeriBildirim('basarili');
                } else {
                    if (data.hata_tipi === 'DUPLICATE_QR') {
                        frontendCacheyeEkle(qrKod);
                        sesliGeriBildirim('tekrar');
                    } else if (data.hata_tipi === 'PAKET_LIMIT_ASILDI') {
                        sesliGeriBildirim('tekrar');
                    } else {
                        sesliGeriBildirim('hata');
                    }
                    okumaHatali(data.message, data.hata_tipi);
                }

            } catch (error) {
                okumaHatali('Bağlantı hatası: ' + error.message, 'CONNECTION_ERROR');
                sesliGeriBildirim('hata');
            } finally {
                yukleniyorGizle();
                if (barkodOkuyucu) barkodOkuyucu.odaklan();
            }
        }

        function okumaBasarili(data) {
            okumaAlaniEl.classList.add('basarili');
            setTimeout(() => okumaAlaniEl.classList.remove('basarili'), 300);

            sonMesajGoster(data.message, 'basarili');

            okumalar.unshift({
                basarili: true,
                mesaj: `${data.eslesen_kalem.malzeme_adi} (${data.paket_bilgi.sira}/${data.paket_bilgi.toplam})`,
                zaman: new Date()
            });
            sonOkumalariGuncelle();
            durumGuncelle();
        }

        function okumaHatali(mesaj, hataTipi) {
            okumaAlaniEl.classList.add('hata');
            setTimeout(() => okumaAlaniEl.classList.remove('hata'), 300);

            sonMesajGoster(mesaj, 'hata');

            okumalar.unshift({ basarili: false, mesaj: mesaj, zaman: new Date() });
            sonOkumalariGuncelle();
        }

        // ==========================================
        // DURUM GÜNCELLE
        // ==========================================
        async function durumGuncelle() {
            try {
                const response = await fetch(`/api/sevk/fis-durumu/${encodeURIComponent(fisNo)}`);
                const data = await response.json();

                if (data.success) {
                    // Fiş özet güncelle
                    if (data.fis) {
                        fisOzet.textContent = `Fiş: ${data.fis.evrakno_sira} - ${data.fis.evrak_adi || '-'}`;
                    }

                    const yuzde = data.tamamlanma_yuzdesi;
                    progressFill.style.width = yuzde + '%';
                    progressText.textContent = yuzde + '%';

                    okunanPaketGoster.textContent = data.okunan_paket;
                    kalanPaketGoster.textContent = data.kalan_paket;
                    toplamPaketGoster.textContent = data.toplam_paket;

                    malzemeListesiGuncelle(data.kalemler);

                    if (data.kalan_paket === 0 && data.toplam_paket > 0) {
                        tamamlandiGoster();
                    }
                }
            } catch (error) {
                console.error('Durum güncelleme hatası:', error);
            }
        }

        // ==========================================
        // MALZEME LİSTESİ
        // ==========================================
        function malzemeDurumSinifi(okunan, toplam) {
            if (okunan === 0) return 'status-gray';
            if (okunan >= toplam) return 'status-green';
            return 'status-yellow';
        }

        function malzemeDurumMetni(okunan, toplam) {
            if (okunan === 0) return 'Bekliyor';
            if (okunan >= toplam) return 'Tamamlandı';
            return `${okunan}/${toplam}`;
        }

        function kalemHtmlOlustur(kalem, index) {
            const durumSinifi = malzemeDurumSinifi(kalem.okunan_paket, kalem.beklenen_paket);
            let miktarInt = 1;
            if (kalem.miktar) {
                const miktarStr = String(kalem.miktar).replace(',', '.');
                miktarInt = Math.floor(parseFloat(miktarStr)) || 1;
            }

            const durumIkon = durumSinifi === 'status-green'
                ? `<span class="malzeme-tik">&#10003;</span>`
                : `<button class="btn-malzeme-oku" onclick="event.stopPropagation(); topluOkut(${kalem.id}, '${(kalem.malzeme_adi || '-').replace(/'/g, "\\'")}')"></button>`;

            return `
                <div class="malzeme-item ${durumSinifi}" data-kalem-id="${kalem.id}" data-index="${index}">
                    <div class="malzeme-baslik-row" onclick="malzemeToggle(${index}, ${kalem.id})">
                        ${durumIkon}
                        <div class="malzeme-bilgi">
                            <div class="malzeme-miktar">${miktarInt} - ${kalem.malzeme_adi || '-'}</div>
                        </div>
                    </div>
                    <div class="paket-detay" id="paketDetay${index}">
                        <div class="paket-detay-icerik" id="paketIcerik${index}">
                            <div class="paket-yukleniyor">Yükleniyor...</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function malzemeListesiGuncelle(kalemler) {
            if (!kalemler || kalemler.length === 0) {
                malzemeListesiEl.innerHTML = '<p style="text-align:center;color:#888;font-size:13px;">Henüz malzeme bilgisi yok</p>';
                return;
            }

            // Depo bazlı grupla (sevk için cikis_depo kullanılır)
            const depoGruplari = {};
            kalemler.forEach(kalem => {
                const depo = kalem.cikis_depo || '0';
                if (!depoGruplari[depo]) depoGruplari[depo] = [];
                depoGruplari[depo].push(kalem);
            });

            const depoSirali = Object.keys(depoGruplari).sort();
            let globalIndex = 0;

            const html = depoSirali.map(depoNo => {
                const depoKalemleri = depoGruplari[depoNo].sort((a, b) => {
                    const durumA = malzemeDurumSinifi(a.okunan_paket, a.beklenen_paket);
                    const durumB = malzemeDurumSinifi(b.okunan_paket, b.beklenen_paket);
                    const sira = { 'status-yellow': 0, 'status-gray': 1, 'status-green': 2 };
                    const durumFark = sira[durumA] - sira[durumB];
                    if (durumFark !== 0) return durumFark;
                    return (a.malzeme_adi || '').localeCompare(b.malzeme_adi || '', 'tr');
                });

                const topBeklenen = depoKalemleri.reduce((t, k) => t + k.beklenen_paket, 0);
                const topOkunan = depoKalemleri.reduce((t, k) => t + k.okunan_paket, 0);
                const topKalem = depoKalemleri.reduce((t, k) => {
                    const m = k.miktar ? Math.ceil(parseFloat(String(k.miktar).replace(',', '.')) || 1) : 1;
                    return t + m;
                }, 0);

                const kalemlerHtml = depoKalemleri.map(kalem => {
                    const h = kalemHtmlOlustur(kalem, globalIndex);
                    globalIndex++;
                    return h;
                }).join('');

                const depoAdi = depoNo === '0' ? 'Genel' : `Depo ${depoNo}`;

                return `
                    <div class="depo-grup">
                        <div class="depo-baslik">
                            <div class="depo-adi">${depoAdi}</div>
                            <div class="depo-ozet">${topKalem} Kalem - (${topOkunan}/${topBeklenen} Paket)</div>
                        </div>
                        <div class="depo-kalemler">${kalemlerHtml}</div>
                    </div>
                `;
            }).join('');

            malzemeListesiEl.innerHTML = html;
        }

        // Malzeme açılır/kapanır
        async function malzemeToggle(index, kalemId) {
            const detay = document.getElementById(`paketDetay${index}`);
            const icerik = document.getElementById(`paketIcerik${index}`);

            if (detay.classList.contains('acik')) {
                detay.classList.remove('acik');
            } else {
                detay.classList.add('acik');
                try {
                    icerik.innerHTML = '<div class="paket-yukleniyor">Yükleniyor...</div>';
                    const response = await fetch(`/api/sevk/malzeme-paketler/${encodeURIComponent(fisNo)}/${kalemId}`);
                    const data = await response.json();

                    if (data.success && data.paketler) {
                        icerik.innerHTML = data.paketler.map(paket => {
                            let paketSinif = 'paket-gray';
                            if (paket.okunan > 0 && paket.okunan < paket.beklenen) paketSinif = 'paket-yellow';
                            if (paket.okunan >= paket.beklenen) paketSinif = 'paket-green';
                            return `
                                <div class="paket-kutu ${paketSinif}">
                                    <div class="paket-etiket">P${paket.paket_sira}</div>
                                    <div class="paket-sayi">${paket.okunan}</div>
                                </div>
                            `;
                        }).join('');
                    } else {
                        icerik.innerHTML = '<div class="paket-yukleniyor">Paket bilgisi bulunamadı</div>';
                    }
                } catch (error) {
                    icerik.innerHTML = '<div class="paket-yukleniyor">Yüklenemedi</div>';
                }
            }
        }

        function tumunuDaralt() {
            document.querySelectorAll('.paket-detay').forEach(d => d.classList.remove('acik'));
        }

        async function tumunuGenislet() {
            const items = document.querySelectorAll('.malzeme-item.status-yellow, .malzeme-item.status-gray');
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                const index = item.dataset.index;
                const kalemId = item.dataset.kalemId;
                const detay = document.getElementById(`paketDetay${index}`);
                const icerik = document.getElementById(`paketIcerik${index}`);

                if (detay.classList.contains('acik')) continue;
                detay.classList.add('acik');

                if (icerik.querySelector('.paket-yukleniyor')) {
                    try {
                        const response = await fetch(`/api/sevk/malzeme-paketler/${encodeURIComponent(fisNo)}/${kalemId}`);
                        const data = await response.json();
                        if (data.success && data.paketler) {
                            icerik.innerHTML = data.paketler.map(paket => {
                                let paketSinif = 'paket-gray';
                                if (paket.okunan > 0 && paket.okunan < paket.beklenen) paketSinif = 'paket-yellow';
                                if (paket.okunan >= paket.beklenen) paketSinif = 'paket-green';
                                return `
                                    <div class="paket-kutu ${paketSinif}">
                                        <div class="paket-etiket">P${paket.paket_sira}</div>
                                        <div class="paket-sayi">${paket.okunan}</div>
                                    </div>
                                `;
                            }).join('');
                        }
                    } catch (e) { }
                }
            }
        }

        // ==========================================
        // TOPLU OKUTMA
        // ==========================================
        async function topluOkut(kalemId, malzemeAdi) {
            if (!kalemId) return;
            if (!confirm(`"${malzemeAdi}" için eksik paketlerin tümü okunmuş sayılsın mı?`)) return;

            try {
                const kullanici = document.getElementById('kullaniciBilgi')?.textContent || 'bilinmiyor';
                const response = await fetch('/api/sevk/toplu-okut', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fis_no: fisNo, kalem_id: kalemId, kullanici: kullanici })
                });
                const data = await response.json();

                if (data.success) {
                    sonMesajGoster(data.message, 'basarili');
                    sesliGeriBildirim('basarili');
                    okumalar.unshift({ basarili: true, mesaj: data.message, zaman: new Date() });
                    sonOkumalariGuncelle();
                    await frontendCacheSenkronize();
                    durumGuncelle();
                } else {
                    sonMesajGoster(data.message, 'hata');
                    sesliGeriBildirim('hata');
                }
            } catch (error) {
                sonMesajGoster('Bağlantı hatası: ' + error.message, 'hata');
                sesliGeriBildirim('hata');
            }
        }

        // ==========================================
        // YARDIMCI FONKSİYONLAR
        // ==========================================
        function sonMesajGoster(mesaj, tip) {
            sonMesaj.textContent = mesaj;
            sonMesaj.className = 'son-mesaj ' + tip;
            sonMesaj.classList.remove('gizle');
        }

        function sonOkumalariGuncelle() {
            const sonOnOkuma = okumalar.slice(0, 10);
            okumaListesi.innerHTML = sonOnOkuma.map(okuma => `
                <div class="okuma-item ${okuma.basarili ? 'basarili' : 'hata'}">
                    <svg class="okuma-ikon ${okuma.basarili ? 'basarili' : 'hata'}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        ${okuma.basarili
                            ? '<polyline points="20 6 9 17 4 12"/>'
                            : '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'
                        }
                    </svg>
                    <div class="okuma-bilgi">
                        <div class="okuma-urun">${okuma.mesaj}</div>
                    </div>
                </div>
            `).join('');
        }

        function tamamlandiGoster() {
            tamamlandiKutu.classList.remove('gizle');
            okumaAlaniEl.style.display = 'none';
            sonMesaj.classList.add('gizle');
            sesliGeriBildirim('tamamlandi');
        }

        function okumaAlaniTemizle() {
            okumaAlaniEl.classList.remove('basarili', 'hata');
        }

        function hataGoster(mesaj) {
            hataKutusu.textContent = mesaj;
            hataKutusu.style.display = 'block';
        }

        function hataGizle() {
            hataKutusu.style.display = 'none';
        }

        function yukleniyorGoster() {
            yukleniyorOverlay.classList.remove('gizle');
        }

        function yukleniyorGizle() {
            yukleniyorOverlay.classList.add('gizle');
        }

        // ==========================================
        // SESLİ GERİ BİLDİRİM
        // ==========================================
        function sesliGeriBildirim(tip) {
            if ('vibrate' in navigator) {
                if (tip === 'basarili') navigator.vibrate(100);
                else if (tip === 'hata' || tip === 'tekrar') navigator.vibrate([100, 50, 100, 50, 100]);
                else if (tip === 'tamamlandi') navigator.vibrate([100, 50, 100, 50, 200]);
            }

            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                if (tip === 'basarili') {
                    oscillator.frequency.value = 880;
                    oscillator.type = 'sine';
                    gainNode.gain.value = 0.3;
                    oscillator.start();
                    oscillator.stop(audioContext.currentTime + 0.1);
                } else if (tip === 'tekrar') {
                    oscillator.frequency.value = 440;
                    oscillator.type = 'sawtooth';
                    gainNode.gain.value = 0.4;
                    oscillator.start();
                    oscillator.stop(audioContext.currentTime + 0.1);
                    setTimeout(() => {
                        try {
                            const ctx2 = new (window.AudioContext || window.webkitAudioContext)();
                            const osc2 = ctx2.createOscillator();
                            const gain2 = ctx2.createGain();
                            osc2.connect(gain2);
                            gain2.connect(ctx2.destination);
                            osc2.frequency.value = 440;
                            osc2.type = 'sawtooth';
                            gain2.gain.value = 0.4;
                            osc2.start();
                            osc2.stop(ctx2.currentTime + 0.1);
                        } catch(e) {}
                    }, 150);
                } else if (tip === 'hata') {
                    oscillator.frequency.value = 220;
                    oscillator.type = 'square';
                    gainNode.gain.value = 0.3;
                    oscillator.start();
                    oscillator.stop(audioContext.currentTime + 0.3);
                } else if (tip === 'tamamlandi') {
                    const notes = [523, 659, 784, 1047];
                    let startTime = audioContext.currentTime;
                    notes.forEach((freq, i) => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.value = freq;
                        osc.type = 'sine';
                        gain.gain.value = 0.2;
                        osc.start(startTime + i * 0.15);
                        osc.stop(startTime + i * 0.15 + 0.15);
                    });
                }
            } catch (e) { }
        }
    </script>
</body>
