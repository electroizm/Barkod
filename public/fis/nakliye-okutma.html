<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nakliye Okutma - Güneşler Elektronik</title>
    <link rel="stylesheet" href="/css/stil.css">
</head>
<body>
    <div class="kapsayici">
        <a href="/giris-islemleri.html" class="geri-buton">Geri</a>

        <h1 class="baslik">Nakliye Okutma</h1>
        <span id="kullaniciBilgi" style="display:none;"></span>

        <!-- Oturum ID yoksa manuel giriş alanı -->
        <div id="oturumSecimAlani" class="oturum-secim" style="display: none;">
            <label for="oturumIdInput">Oturum Numarası</label>
            <input type="text" id="oturumIdInput" placeholder="Örn: 260109-01">
            <button type="button" class="ara-btn" id="oturumAraBtn">Oturum Ara</button>
            <button type="button" class="acik-oturum-btn" id="acikOturumlarBtn">Açık Oturumları Göster</button>
            <button type="button" class="kapatilan-oturum-btn" id="kapatilanOturumlarBtn">Kapatılan Oturumları Göster</button>
        </div>

        <!-- Açık Oturumlar Modal -->
        <div id="acikOturumOverlay" class="acik-oturum-overlay">
            <div class="acik-oturum-modal">
                <div class="modal-baslik">
                    <h3>Açık Oturumlar</h3>
                    <button type="button" class="modal-kapat" id="modalKapat">&times;</button>
                </div>
                <div id="oturumListesi" class="oturum-liste">
                    <!-- Oturumlar buraya yüklenecek -->
                </div>
            </div>
        </div>

        <!-- Kapatılan Oturumlar Modal -->
        <div id="kapatilanOturumOverlay" class="acik-oturum-overlay">
            <div class="acik-oturum-modal">
                <div class="modal-baslik">
                    <h3>Kapatılan Oturumlar</h3>
                    <button type="button" class="modal-kapat" id="kapatilanModalKapat">&times;</button>
                </div>
                <div id="kapatilanOturumListesi" class="oturum-liste">
                    <!-- Kapatılan oturumlar buraya yüklenecek -->
                </div>
            </div>
        </div>

        <!-- Oturum bilgileri -->
        <div id="oturumBilgiAlani" style="display: none;">
            <div class="oturum-bilgi">
                <div class="oturum-baslik">
                    <span>Oturum:</span>
                    <span class="oturum-id" id="oturumIdGoster"></span>
                </div>

                <div class="bilgi-grid">
                    <div class="bilgi-satir">
                        <span class="bilgi-etiket">Depo Yeri</span>
                        <span class="bilgi-deger" id="depoYeriGoster">-</span>
                    </div>
                    <div class="bilgi-satir">
                        <span class="bilgi-etiket">Şoför</span>
                        <span class="bilgi-deger" id="soforGoster">-</span>
                    </div>
                    <div class="bilgi-satir">
                        <span class="bilgi-etiket">Plaka</span>
                        <span class="bilgi-deger" id="plakaGoster">-</span>
                    </div>
                    <div class="bilgi-satir">
                        <span class="bilgi-etiket">Kullanıcı</span>
                        <span class="bilgi-deger" id="kullaniciGoster">-</span>
                    </div>
                </div>

                <div class="istatistik-kutu">
                    <div class="istatistik">
                        <div class="istatistik-sayi" id="toplamKalemGoster">0</div>
                        <div class="istatistik-etiket">Kalem</div>
                    </div>
                    <div class="istatistik">
                        <div class="istatistik-sayi" id="toplamPaketGoster">0</div>
                        <div class="istatistik-etiket">Paket</div>
                    </div>
                </div>
            </div>

            <button type="button" class="okutma-btn" id="okumayaBaslaBtn">
                Okumaya Başla
            </button>
        </div>

        <!-- Hata mesajı -->
        <div id="hataKutusu" class="hata-kutu" style="display: none;"></div>
    </div>

    <div id="yukleniyor" class="yukleniyor-overlay gizle">
        <div class="yukleniyor-icerik">
            <div class="spinner"></div>
            <div>Yükleniyor...</div>
        </div>
    </div>

    <script src="/js/ortak.js"></script>
    <script>
        // Elementler
        const oturumSecimAlani = document.getElementById('oturumSecimAlani');
        const oturumBilgiAlani = document.getElementById('oturumBilgiAlani');
        const oturumIdInput = document.getElementById('oturumIdInput');
        const oturumAraBtn = document.getElementById('oturumAraBtn');
        const oturumIdGoster = document.getElementById('oturumIdGoster');
        const depoYeriGoster = document.getElementById('depoYeriGoster');
        const soforGoster = document.getElementById('soforGoster');
        const plakaGoster = document.getElementById('plakaGoster');
        const kullaniciGoster = document.getElementById('kullaniciGoster');
        const toplamKalemGoster = document.getElementById('toplamKalemGoster');
        const toplamPaketGoster = document.getElementById('toplamPaketGoster');
        const okumayaBaslaBtn = document.getElementById('okumayaBaslaBtn');
        const hataKutusu = document.getElementById('hataKutusu');
        const yukleniyorOverlay = document.getElementById('yukleniyor');
        const acikOturumlarBtn = document.getElementById('acikOturumlarBtn');
        const acikOturumOverlay = document.getElementById('acikOturumOverlay');
        const oturumListesi = document.getElementById('oturumListesi');
        const modalKapat = document.getElementById('modalKapat');
        const kapatilanOturumlarBtn = document.getElementById('kapatilanOturumlarBtn');
        const kapatilanOturumOverlay = document.getElementById('kapatilanOturumOverlay');
        const kapatilanOturumListesi = document.getElementById('kapatilanOturumListesi');
        const kapatilanModalKapat = document.getElementById('kapatilanModalKapat');

        let mevcutOturum = null;
        let oturumKalemleri = [];

        // URL'den oturum parametresini al
        const urlParams = new URLSearchParams(window.location.search);
        const oturumParam = urlParams.get('oturum');

        // Sayfa yüklendiğinde
        if (oturumParam) {
            // URL'de oturum varsa direkt yükle
            oturumYukle(oturumParam);
        } else {
            // Yoksa manuel giriş alanını göster
            oturumSecimAlani.style.display = 'block';
        }

        // Oturum ara butonu
        oturumAraBtn.addEventListener('click', function() {
            const oturumId = oturumIdInput.value.trim();
            if (oturumId) {
                oturumYukle(oturumId);
            } else {
                hataGoster('Lütfen oturum numarası girin');
            }
        });

        // Enter ile arama
        oturumIdInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                oturumAraBtn.click();
            }
        });

        // Açık oturumlar butonu
        acikOturumlarBtn.addEventListener('click', async function() {
            oturumListesi.innerHTML = '<div class="bos-liste">Yükleniyor...</div>';
            acikOturumOverlay.classList.add('goster');

            try {
                const response = await fetch('/api/supabase/acik-oturumlar');
                const data = await response.json();

                if (data.success && data.oturumlar.length > 0) {
                    oturumListesi.innerHTML = data.oturumlar.map(oturum => {
                        const tarih = new Date(oturum.tarih).toLocaleDateString('tr-TR');
                        return `
                            <div class="oturum-item" data-oturum="${oturum.oturum_id}">
                                <div class="oturum-item-baslik">${oturum.oturum_id}</div>
                                <div class="oturum-item-detay">${oturum.plaka || '-'} | ${tarih}</div>
                                <div class="oturum-item-kalan">${oturum.kalan_paket} paket kaldı (${oturum.okunan_paket}/${oturum.toplam_paket})</div>
                            </div>
                        `;
                    }).join('');

                    // Tıklama olayları - barkod-okut.html sayfasına yönlendir
                    document.querySelectorAll('.oturum-item').forEach(item => {
                        item.addEventListener('click', function() {
                            const oturumId = this.dataset.oturum;
                            acikOturumOverlay.classList.remove('goster');
                            window.location.href = `/fis/barkod-okut.html?oturum=${oturumId}`;
                        });
                    });
                } else {
                    oturumListesi.innerHTML = '<div class="bos-liste">Açık oturum bulunamadı</div>';
                }
            } catch (error) {
                oturumListesi.innerHTML = '<div class="bos-liste">Hata: ' + error.message + '</div>';
            }
        });

        // Modal kapat
        modalKapat.addEventListener('click', function() {
            acikOturumOverlay.classList.remove('goster');
        });

        // Overlay'e tıklayınca kapat
        acikOturumOverlay.addEventListener('click', function(e) {
            if (e.target === acikOturumOverlay) {
                acikOturumOverlay.classList.remove('goster');
            }
        });

        // Kapatılan oturumlar butonu
        kapatilanOturumlarBtn.addEventListener('click', async function() {
            kapatilanOturumListesi.innerHTML = '<div class="bos-liste">Yükleniyor...</div>';
            kapatilanOturumOverlay.classList.add('goster');

            try {
                const response = await fetch('/api/supabase/kapatilan-oturumlar');
                const data = await response.json();

                if (data.success && data.oturumlar.length > 0) {
                    kapatilanOturumListesi.innerHTML = data.oturumlar.map(oturum => {
                        const tarih = new Date(oturum.tarih).toLocaleDateString('tr-TR');
                        return `
                            <div class="oturum-item kapatilan" data-oturum="${oturum.oturum_id}">
                                <div class="oturum-item-baslik">${oturum.oturum_id}</div>
                                <div class="oturum-item-detay">${oturum.plaka || '-'} | ${tarih}</div>
                                <div class="oturum-item-kalan" style="color: #27ae60;">Tamamlandı (${oturum.okunan_paket}/${oturum.toplam_paket})</div>
                            </div>
                        `;
                    }).join('');

                    // Tıklama olayları - barkod-okut.html sayfasına yönlendir
                    kapatilanOturumListesi.querySelectorAll('.oturum-item').forEach(item => {
                        item.addEventListener('click', function() {
                            const oturumId = this.dataset.oturum;
                            kapatilanOturumOverlay.classList.remove('goster');
                            window.location.href = `/fis/barkod-okut.html?oturum=${oturumId}`;
                        });
                    });
                } else {
                    kapatilanOturumListesi.innerHTML = '<div class="bos-liste">Kapatılan oturum bulunamadı</div>';
                }
            } catch (error) {
                kapatilanOturumListesi.innerHTML = '<div class="bos-liste">Hata: ' + error.message + '</div>';
            }
        });

        // Kapatılan modal kapat
        kapatilanModalKapat.addEventListener('click', function() {
            kapatilanOturumOverlay.classList.remove('goster');
        });

        // Kapatılan overlay'e tıklayınca kapat
        kapatilanOturumOverlay.addEventListener('click', function(e) {
            if (e.target === kapatilanOturumOverlay) {
                kapatilanOturumOverlay.classList.remove('goster');
            }
        });

        // Oturum bilgilerini yükle
        async function oturumYukle(oturumId) {
            yukleniyorGoster();
            hataGizle();

            try {
                const response = await fetch(`/api/supabase/oturum/${encodeURIComponent(oturumId)}`);
                const data = await response.json();

                if (data.success) {
                    mevcutOturum = data.oturum;
                    oturumKalemleri = data.kalemler;

                    // Bilgileri göster
                    oturumIdGoster.textContent = mevcutOturum.oturum_id;
                    depoYeriGoster.textContent = mevcutOturum.depo_yeri;
                    soforGoster.textContent = mevcutOturum.sofor_adi || '-';
                    plakaGoster.textContent = mevcutOturum.plaka || '-';
                    kullaniciGoster.textContent = mevcutOturum.kullanici || '-';
                    toplamKalemGoster.textContent = mevcutOturum.toplam_kalem;
                    toplamPaketGoster.textContent = mevcutOturum.toplam_paket;

                    // Alanları güncelle
                    oturumSecimAlani.style.display = 'none';
                    oturumBilgiAlani.style.display = 'block';

                    // URL'i güncelle (history'ye ekle)
                    if (!oturumParam) {
                        history.replaceState(null, '', `?oturum=${oturumId}`);
                    }
                } else {
                    hataGoster(data.message || 'Oturum bulunamadı');
                    oturumSecimAlani.style.display = 'block';
                    oturumBilgiAlani.style.display = 'none';
                }
            } catch (error) {
                hataGoster('Bağlantı hatası: ' + error.message);
                oturumSecimAlani.style.display = 'block';
                oturumBilgiAlani.style.display = 'none';
            } finally {
                yukleniyorGizle();
            }
        }

        // Okumaya başla butonu
        okumayaBaslaBtn.addEventListener('click', function() {
            if (!mevcutOturum) {
                alert('Önce bir oturum seçin');
                return;
            }

            // Barkod okutma sayfasına git
            window.location.href = `/fis/barkod-okut.html?oturum=${mevcutOturum.oturum_id}`;
        });

        function hataGoster(mesaj) {
            hataKutusu.textContent = mesaj;
            hataKutusu.style.display = 'block';
        }

        function hataGizle() {
            hataKutusu.style.display = 'none';
        }

        function yukleniyorGoster() {
            yukleniyorOverlay.classList.remove('gizle');
        }

        function yukleniyorGizle() {
            yukleniyorOverlay.classList.add('gizle');
        }
    </script>
</body>
</html>
