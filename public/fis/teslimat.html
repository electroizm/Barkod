<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Satış / Teslimat Fişi - Güneşler Elektronik</title>
    <link rel="stylesheet" href="/css/stil.css">
</head>
<body>
    <div class="kapsayici">
        <a href="/cikis-islemleri.html" class="geri-buton">Geri</a>

        <h1 class="baslik">Satış / Teslimat Fişi</h1>
        <span id="kullaniciBilgi" style="display:none;"></span>

        <!-- Fatura No yoksa manuel giriş alanı -->
        <div id="faturaSecimAlani" class="fatura-secim" style="display: none;">
            <label for="faturaNoInput">Fatura No</label>
            <input type="text" id="faturaNoInput" placeholder="Örn: 13420">
            <button type="button" class="ara-btn" id="faturaAraBtn">Fatura Ara</button>
            <button type="button" class="acik-fatura-btn" id="acikFaturalarBtn">Açık Faturalar</button>
            <button type="button" class="kapatilan-fatura-btn" id="kapatilanFaturalarBtn">Kapatılan Faturalar</button>
        </div>

        <!-- Açık Faturalar Modal -->
        <div id="acikFaturaOverlay" class="fatura-overlay">
            <div class="fatura-modal">
                <div class="modal-baslik">
                    <h3>Açık Faturalar</h3>
                    <button type="button" class="modal-kapat" id="acikModalKapat">&times;</button>
                </div>
                <div id="acikFaturaListesi" class="fatura-liste">
                </div>
            </div>
        </div>

        <!-- Kapatılan Faturalar Modal -->
        <div id="kapatilanFaturaOverlay" class="fatura-overlay">
            <div class="fatura-modal">
                <div class="modal-baslik">
                    <h3>Kapatılan Faturalar</h3>
                    <button type="button" class="modal-kapat" id="kapatilanModalKapat">&times;</button>
                </div>
                <div id="kapatilanFaturaListesi" class="fatura-liste">
                </div>
            </div>
        </div>

        <!-- Fatura bilgileri -->
        <div id="faturaBilgiAlani" style="display: none;">
            <div class="fatura-bilgi">
                <div class="fatura-baslik">
                    <span>Fatura:</span>
                    <span class="fatura-id" id="faturaNoGoster"></span>
                </div>

                <div class="bilgi-grid">
                    <div class="bilgi-satir">
                        <span class="bilgi-etiket">Cari Kodu</span>
                        <span class="bilgi-deger" id="cariKoduGoster">-</span>
                    </div>
                    <div class="bilgi-satir">
                        <span class="bilgi-etiket">Cari Adı</span>
                        <span class="bilgi-deger" id="cariAdiGoster">-</span>
                    </div>
                    <div class="bilgi-satir">
                        <span class="bilgi-etiket">Tarih</span>
                        <span class="bilgi-deger" id="tarihGoster">-</span>
                    </div>
                    <div class="bilgi-satir">
                        <span class="bilgi-etiket">Evrak Adı</span>
                        <span class="bilgi-deger" id="evrakAdiGoster">-</span>
                    </div>
                </div>

                <!-- Müşteri İletişim Bilgileri -->
                <div id="musteriIletisim" style="display:none; margin-top:12px; padding-top:12px; border-top:1px solid #eee;">
                    <div class="bilgi-grid">
                        <div class="bilgi-satir">
                            <span class="bilgi-etiket">Telefon 1</span>
                            <span class="bilgi-deger" id="cepTelGoster" style="color:#2563eb;">-</span>
                        </div>
                        <div class="bilgi-satir">
                            <span class="bilgi-etiket">Telefon 2</span>
                            <span class="bilgi-deger" id="telefonGoster" style="color:#2563eb;">-</span>
                        </div>
                        <div class="bilgi-satir" style="grid-column: 1 / -1;">
                            <span class="bilgi-etiket">Adres</span>
                            <span class="bilgi-deger" id="adresGoster" style="font-size:13px;">-</span>
                        </div>
                    </div>
                </div>

                <div class="istatistik-kutu">
                    <div class="istatistik">
                        <div class="istatistik-sayi" id="toplamKalemGoster">0</div>
                        <div class="istatistik-etiket">Kalem</div>
                    </div>
                    <div class="istatistik">
                        <div class="istatistik-sayi" id="toplamPaketGoster">0</div>
                        <div class="istatistik-etiket">Paket</div>
                    </div>
                </div>
            </div>

            <button type="button" class="okutma-btn" id="okumayaBaslaBtn">
                Okumaya Başla
            </button>
        </div>

        <!-- Hata mesajı -->
        <div id="hataKutusu" class="hata-kutu" style="display: none;"></div>
    </div>

    <div id="yukleniyor" class="yukleniyor-overlay gizle">
        <div class="yukleniyor-icerik">
            <div class="spinner"></div>
            <div>Yükleniyor...</div>
        </div>
    </div>

    <script src="/js/ortak.js"></script>
    <script>
        // Elementler
        const faturaSecimAlani = document.getElementById('faturaSecimAlani');
        const faturaBilgiAlani = document.getElementById('faturaBilgiAlani');
        const faturaNoInput = document.getElementById('faturaNoInput');
        const faturaAraBtn = document.getElementById('faturaAraBtn');
        const faturaNoGoster = document.getElementById('faturaNoGoster');
        const cariKoduGoster = document.getElementById('cariKoduGoster');
        const cariAdiGoster = document.getElementById('cariAdiGoster');
        const tarihGoster = document.getElementById('tarihGoster');
        const evrakAdiGoster = document.getElementById('evrakAdiGoster');
        const toplamKalemGoster = document.getElementById('toplamKalemGoster');
        const toplamPaketGoster = document.getElementById('toplamPaketGoster');
        const okumayaBaslaBtn = document.getElementById('okumayaBaslaBtn');
        const hataKutusu = document.getElementById('hataKutusu');
        const yukleniyorOverlay = document.getElementById('yukleniyor');
        const acikFaturalarBtn = document.getElementById('acikFaturalarBtn');
        const acikFaturaOverlay = document.getElementById('acikFaturaOverlay');
        const acikFaturaListesi = document.getElementById('acikFaturaListesi');
        const acikModalKapat = document.getElementById('acikModalKapat');
        const kapatilanFaturalarBtn = document.getElementById('kapatilanFaturalarBtn');
        const kapatilanFaturaOverlay = document.getElementById('kapatilanFaturaOverlay');
        const kapatilanFaturaListesi = document.getElementById('kapatilanFaturaListesi');
        const kapatilanModalKapat = document.getElementById('kapatilanModalKapat');

        let mevcutFatura = null;
        let faturaKalemleri = [];

        // URL'den fatura parametresini al
        const urlParams = new URLSearchParams(window.location.search);
        const faturaParam = urlParams.get('fatura');

        // Sayfa yüklendiğinde
        if (faturaParam) {
            faturaYukle(faturaParam);
        } else {
            faturaSecimAlani.style.display = 'block';
        }

        // 5 haneli sayı girilince otomatik ara
        faturaNoInput.addEventListener('input', function(e) {
            const deger = e.target.value.trim();
            // Sadece rakam ve 5 hane ise otomatik ara
            if (/^\d{5}$/.test(deger)) {
                faturaYukle(deger);
            }
        });

        // Fatura ara butonu
        faturaAraBtn.addEventListener('click', function() {
            const faturaNo = faturaNoInput.value.trim();
            if (faturaNo) {
                faturaYukle(faturaNo);
            } else {
                hataGoster('Lütfen fatura numarası girin');
            }
        });

        // Enter ile arama
        faturaNoInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                faturaAraBtn.click();
            }
        });

        // Açık faturalar butonu
        acikFaturalarBtn.addEventListener('click', async function() {
            acikFaturaListesi.innerHTML = '<div class="bos-liste">Yükleniyor...</div>';
            acikFaturaOverlay.classList.add('goster');

            try {
                const response = await fetch('/api/mikro/acik-faturalar');
                const data = await response.json();

                if (data.success && data.faturalar.length > 0) {
                    acikFaturaListesi.innerHTML = data.faturalar.map(fatura => {
                        const tarih = fatura.tarih ? new Date(fatura.tarih).toLocaleDateString('tr-TR') : '-';
                        return `
                            <div class="fatura-item" data-fatura="${fatura.evrakno_sira}">
                                <div class="fatura-item-baslik">${fatura.cari_adi || '-'}</div>
                                <div class="fatura-item-detay">${fatura.evrakno_sira} | ${tarih}</div>
                                <div class="fatura-item-kalan">${fatura.kalan_paket} paket kaldı (${fatura.okunan_paket}/${fatura.toplam_paket})</div>
                            </div>
                        `;
                    }).join('');

                    acikFaturaListesi.querySelectorAll('.fatura-item').forEach(item => {
                        item.addEventListener('click', function() {
                            const faturaNo = this.dataset.fatura;
                            acikFaturaOverlay.classList.remove('goster');
                            window.location.href = `/fis/teslimat-okut.html?fatura=${faturaNo}`;
                        });
                    });
                } else {
                    acikFaturaListesi.innerHTML = '<div class="bos-liste">Açık fatura bulunamadı</div>';
                }
            } catch (error) {
                acikFaturaListesi.innerHTML = '<div class="bos-liste">Hata: ' + error.message + '</div>';
            }
        });

        // Açık modal kapat
        acikModalKapat.addEventListener('click', function() {
            acikFaturaOverlay.classList.remove('goster');
        });

        acikFaturaOverlay.addEventListener('click', function(e) {
            if (e.target === acikFaturaOverlay) {
                acikFaturaOverlay.classList.remove('goster');
            }
        });

        // Kapatılan faturalar butonu
        kapatilanFaturalarBtn.addEventListener('click', async function() {
            kapatilanFaturaListesi.innerHTML = '<div class="bos-liste">Yükleniyor...</div>';
            kapatilanFaturaOverlay.classList.add('goster');

            try {
                const response = await fetch('/api/mikro/kapatilan-faturalar');
                const data = await response.json();

                if (data.success && data.faturalar.length > 0) {
                    kapatilanFaturaListesi.innerHTML = data.faturalar.map(fatura => {
                        const tarih = fatura.tarih ? new Date(fatura.tarih).toLocaleDateString('tr-TR') : '-';
                        return `
                            <div class="fatura-item" data-fatura="${fatura.evrakno_sira}">
                                <div class="fatura-item-baslik">${fatura.cari_adi || '-'}</div>
                                <div class="fatura-item-detay">${fatura.evrakno_sira} | ${tarih}</div>
                                <div class="fatura-item-kalan" style="color: #27ae60;">Tamamlandı (${fatura.okunan_paket}/${fatura.toplam_paket})</div>
                            </div>
                        `;
                    }).join('');

                    kapatilanFaturaListesi.querySelectorAll('.fatura-item').forEach(item => {
                        item.addEventListener('click', function() {
                            const faturaNo = this.dataset.fatura;
                            kapatilanFaturaOverlay.classList.remove('goster');
                            window.location.href = `/fis/teslimat-okut.html?fatura=${faturaNo}`;
                        });
                    });
                } else {
                    kapatilanFaturaListesi.innerHTML = '<div class="bos-liste">Kapatılan fatura bulunamadı</div>';
                }
            } catch (error) {
                kapatilanFaturaListesi.innerHTML = '<div class="bos-liste">Hata: ' + error.message + '</div>';
            }
        });

        // Kapatılan modal kapat
        kapatilanModalKapat.addEventListener('click', function() {
            kapatilanFaturaOverlay.classList.remove('goster');
        });

        kapatilanFaturaOverlay.addEventListener('click', function(e) {
            if (e.target === kapatilanFaturaOverlay) {
                kapatilanFaturaOverlay.classList.remove('goster');
            }
        });

        // Fatura bilgilerini yükle
        async function faturaYukle(faturaNo) {
            yukleniyorGoster();
            hataGizle();

            try {
                const response = await fetch(`/api/mikro/fatura/${encodeURIComponent(faturaNo)}`);
                const data = await response.json();

                if (data.success) {
                    mevcutFatura = data.fatura;
                    faturaKalemleri = data.kalemler;

                    // Bilgileri göster
                    faturaNoGoster.textContent = mevcutFatura.evrakno_seri ? `${mevcutFatura.evrakno_seri}-${Math.abs(mevcutFatura.evrakno_sira)}` : Math.abs(mevcutFatura.evrakno_sira);
                    cariKoduGoster.textContent = mevcutFatura.cari_kodu || '-';
                    cariAdiGoster.textContent = mevcutFatura.cari_adi || '-';
                    tarihGoster.textContent = mevcutFatura.tarih ? new Date(mevcutFatura.tarih).toLocaleDateString('tr-TR') : '-';
                    evrakAdiGoster.textContent = mevcutFatura.evrak_adi || '-';
                    toplamKalemGoster.textContent = mevcutFatura.toplam_kalem;
                    toplamPaketGoster.textContent = mevcutFatura.toplam_paket;

                    // Okunan paket sayısını al
                    try {
                        const durumResponse = await fetch(`/api/mikro/fatura-durumu/${encodeURIComponent(faturaNo)}`);
                        const durumData = await durumResponse.json();
                        if (durumData.success) {
                            toplamPaketGoster.textContent = `${durumData.okunan_paket} / ${durumData.toplam_paket}`;
                        }
                    } catch (e) { }

                    // Müşteri adres/telefon bilgilerini al
                    if (mevcutFatura.cari_kodu) {
                        try {
                            const adresResponse = await fetch(`/api/mikro/cari-adres/${encodeURIComponent(mevcutFatura.cari_kodu)}`);
                            const adresData = await adresResponse.json();
                            if (adresData.success && adresData.adres) {
                                const a = adresData.adres;

                                // Telefon: 0 ile başlamıyorsa 0 ekle
                                function telFormat(num) {
                                    if (!num) return null;
                                    num = num.trim();
                                    if (num && !num.startsWith('0')) num = '0' + num;
                                    return num;
                                }
                                const tel = telFormat(a.cari_vdaire_adi) || '-';
                                const cepTel = telFormat(a.cari_ceptel) || '-';

                                // Adres: tek satırda cadde + sokak + ilçe + il
                                const adresParts = [a.adr_cadde, a.adr_sokak, a.adr_ilce, a.adr_il].filter(Boolean);
                                const adres = adresParts.length > 0 ? adresParts.join(' ') : '-';

                                // Telefon tıklanabilir
                                if (tel !== '-') {
                                    document.getElementById('telefonGoster').innerHTML = `<a href="tel:${tel}" style="color:#2563eb;text-decoration:none;">${tel}</a>`;
                                } else {
                                    document.getElementById('telefonGoster').textContent = '-';
                                }
                                if (cepTel !== '-') {
                                    document.getElementById('cepTelGoster').innerHTML = `<a href="tel:${cepTel}" style="color:#2563eb;text-decoration:none;">${cepTel}</a>`;
                                } else {
                                    document.getElementById('cepTelGoster').textContent = '-';
                                }

                                // Adres: Google Maps linki
                                if (adres !== '-') {
                                    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(adres)}`;
                                    document.getElementById('adresGoster').innerHTML = `<a href="${mapsUrl}" target="_blank" style="color:#2563eb;text-decoration:none;">${adres} &#x1F4CD;</a>`;
                                } else {
                                    document.getElementById('adresGoster').textContent = '-';
                                }

                                document.getElementById('musteriIletisim').style.display = 'block';
                            }
                        } catch (e) {
                            console.log('Adres bilgisi alinamadi:', e.message);
                        }
                    }

                    // Alanları güncelle
                    faturaSecimAlani.style.display = 'none';
                    faturaBilgiAlani.style.display = 'block';

                    // URL'i güncelle
                    if (!faturaParam) {
                        history.replaceState(null, '', `?fatura=${faturaNo}`);
                    }
                } else {
                    hataGoster(data.message || 'Fatura bulunamadı');
                    faturaSecimAlani.style.display = 'block';
                    faturaBilgiAlani.style.display = 'none';
                }
            } catch (error) {
                hataGoster('Bağlantı hatası: ' + error.message);
                faturaSecimAlani.style.display = 'block';
                faturaBilgiAlani.style.display = 'none';
            } finally {
                yukleniyorGizle();
            }
        }

        // Okumaya başla butonu
        okumayaBaslaBtn.addEventListener('click', function() {
            if (!mevcutFatura) {
                alert('Önce bir fatura seçin');
                return;
            }

            // Barkod okutma sayfasına git
            window.location.href = `/fis/teslimat-okut.html?fatura=${mevcutFatura.evrakno_sira}`;
        });

        function hataGoster(mesaj) {
            hataKutusu.textContent = mesaj;
            hataKutusu.style.display = 'block';
        }

        function hataGizle() {
            hataKutusu.style.display = 'none';
        }

        function yukleniyorGoster() {
            yukleniyorOverlay.classList.remove('gizle');
        }

        function yukleniyorGizle() {
            yukleniyorOverlay.classList.add('gizle');
        }
    </script>
</body>
</html>
