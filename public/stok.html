<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stok - Güneşler Elektronik</title>
    <link rel="stylesheet" href="/css/stil.css">
</head>
<body>
    <div class="kapsayici">
        <a href="/anasayfa.html" class="geri-buton">Geri</a>
        <h1 class="baslik">Stok Arama</h1>

        <div class="arama-alani">
            <input type="text" class="arama-input" id="aramaInput" placeholder="Malzeme adı veya stok kodu ile arayın..." autofocus>
        </div>

        <div class="sonuc-bilgi" id="sonucBilgi"></div>

        <div class="stok-liste" id="stokListe">
            <div class="bos-mesaj">Aramaya başlamak için yukarıdaki alana yazın.</div>
        </div>
    </div>

    <script src="/js/ortak.js"></script>
    <script>
        const aramaInput = document.getElementById('aramaInput');
        const stokListe = document.getElementById('stokListe');
        const sonucBilgi = document.getElementById('sonucBilgi');

        const DETAY_SUTUNLARI = ['DEPO', 'EXC', 'SUBE', 'Borç', 'Bekleyen', 'Plan', 'ID1', 'ID2', '###', 'LISTE', 'INDIRIM', 'PERAKENDE'];
        const ETIKET_ADLARI = { 'ID1': 'ProSAP', 'ID2': 'Excel', '###': 'Marj', 'PERAKENDE': 'Fiyat' };
        const FIYAT_SUTUNLARI = ['PERAKENDE', 'LISTE', 'ID1', 'ID2'];

        let aramaZamanlayici = null;

        aramaInput.addEventListener('input', function() {
            clearTimeout(aramaZamanlayici);
            aramaZamanlayici = setTimeout(() => {
                stokAra(this.value.trim());
            }, 300);
        });

        async function stokAra(sorgu) {
            if (!sorgu || sorgu.length < 2) {
                stokListe.innerHTML = '<div class="bos-mesaj">Aramaya başlamak için en az 2 karakter yazın.</div>';
                sonucBilgi.textContent = '';
                return;
            }

            stokListe.innerHTML = '<div class="yukleniyor">Aranıyor...</div>';

            try {
                const response = await fetch(`/api/stok/ara?q=${encodeURIComponent(sorgu)}`);
                const data = await response.json();

                if (!data.success) {
                    stokListe.innerHTML = `<div class="bos-mesaj">${data.message}</div>`;
                    sonucBilgi.textContent = '';
                    return;
                }

                if (data.sonuclar.length === 0) {
                    stokListe.innerHTML = '<div class="bos-mesaj">Sonuç bulunamadı.</div>';
                    sonucBilgi.textContent = '';
                    return;
                }

                sonucBilgi.textContent = `${data.sonuclar.length} sonuç bulundu`;

                stokListe.innerHTML = data.sonuclar.map((kayit, index) => {
                    const malzemeAdi = kayit['Malzeme Adı'] || '-';
                    const fazla = parseInt(kayit['Fazla']) || 0;
                    const miktar = parseInt(kayit['Miktar']) || 0;
                    const fazlaRenk = fazla > 0 ? '#27ae60' : '#f39c12';

                    const detayHTML = DETAY_SUTUNLARI.map(sutun => {
                        let deger = kayit[sutun] !== undefined ? kayit[sutun] : '-';
                        if (FIYAT_SUTUNLARI.includes(sutun) && deger !== '-') {
                            deger = Number(deger).toLocaleString('tr-TR');
                        }
                        const etiket = ETIKET_ADLARI[sutun] || sutun;
                        return `<div class="detay-item">
                            <span class="detay-etiket">${etiket}</span>
                            <span class="detay-deger">${deger}</span>
                        </div>`;
                    }).join('');

                    return `<div class="stok-item">
                        <div class="stok-item-baslik" onclick="detayToggle(${index})">
                            <span class="stok-malzeme-adi">${malzemeAdi}</span>
                            <span class="stok-depo-badge" style="border-color:${fazlaRenk};color:${fazlaRenk}">${fazla}</span>
                            <span class="stok-depo-badge" style="border-color:#333">${miktar}</span>
                        </div>
                        <div class="stok-detay" id="detay${index}">
                            <div class="detay-grid">${detayHTML}</div>
                        </div>
                    </div>`;
                }).join('');

            } catch (error) {
                stokListe.innerHTML = `<div class="bos-mesaj">Bağlantı hatası: ${error.message}</div>`;
                sonucBilgi.textContent = '';
            }
        }

        function detayToggle(index) {
            const detay = document.getElementById(`detay${index}`);
            detay.classList.toggle('acik');
        }
    </script>
</body>
</html>
